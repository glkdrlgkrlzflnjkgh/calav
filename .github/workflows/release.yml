name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      # -------------------------
      # LINUX PUBLISH + ZIP
      # -------------------------
      - name: Publish Linux (linux-x64)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet publish -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Zip Linux build
        shell: bash
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd publish
          zip -r ../CalavScanner-linux-x64.zip .

      # -------------------------
      # WINDOWS PUBLISH + ZIP
      # -------------------------
      - name: Publish Windows (win-x64)
        if: matrix.os == 'windows-latest'
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Zip Windows build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location publish
          Compress-Archive -Path * -DestinationPath ../CalavScanner-win-x64.zip

      # -------------------------
      # UPLOAD ARTIFACTS
      # -------------------------
      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-artifact
          path: CalavScanner-linux-x64.zip

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-artifact
          path: CalavScanner-win-x64.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/CalavScanner-linux-x64.zip
            artifacts/**/CalavScanner-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
