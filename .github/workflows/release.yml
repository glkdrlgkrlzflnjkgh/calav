name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      # -------------------------
      # WINDOWS BUILD
      # -------------------------
      - name: Publish Windows (win-x64)
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish-win

      - name: Zip Windows build
        run: |
          cd publish-win
          zip -r ../CalavScanner-win-x64.zip .

      # -------------------------
      # LINUX BUILD
      # -------------------------
      - name: Publish Linux (linux-x64)
        run: dotnet publish -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./publish-linux

      - name: Zip Linux build
        run: |
          cd publish-linux
          zip -r ../CalavScanner-linux-x64.zip .

      # -------------------------
      # RELEASE CREATION
      # -------------------------
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CalavScanner-win-x64.zip
            CalavScanner-linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
